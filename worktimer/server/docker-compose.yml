# Local / self-hosted worktimer sync server.
# In-memory and ephemeral: documents live only while the server runs and at
# least one client holds them. Put a TLS-terminating reverse proxy in front
# for production (the sync code is a bearer secret and must travel over wss).
services:
  sync:
    build: .
    ports:
      - "1234:1234"
    environment:
      - PORT=1234
      # REQUIRED. Comma-separated origins allowed to connect (the browser's
      # Origin header). Change to your app's origin in production, e.g.
      # https://tools.rknt.de — the server refuses to start without this.
      - ALLOWED_ORIGINS=http://localhost:8080
      # Abuse limits (sane defaults shown; tune per deployment).
      - MAX_ROOMS=100
      - MAX_MESSAGE_BYTES=1000000
      - MAX_DOC_BYTES=5000000
    restart: unless-stopped
